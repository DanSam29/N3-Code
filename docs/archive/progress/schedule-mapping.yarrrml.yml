prefixes:
  ex: http://example.org#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  xsd: http://www.w3.org/2001/XMLSchema#

mappings:
  document:
    sources:
      - ['schedule-example.csv~csv']
    s: ex:$(documentId)
    po:
      - [a, ex:ScheduleDocument]
      - [ex:filename, $(document)]
      - p: ex:containsLesson
        o:
          - value: ex:$(lessonId)
            type: iri

  group:
    sources:
      - ['schedule-example.csv~csv']
    s: ex:$(groupId)
    po:
      - [a, ex:Group]
      - [ex:groupName, $(group)]
      - [ex:course, $(course), xsd:integer]
      - [ex:faculty, $(faculty)]
      - [ex:specialty, $(specialty)]
      - p: ex:hasLesson
        o:
          - value: ex:$(lessonId)
            type: iri

  teacher:
    sources:
      - ['schedule-example.csv~csv']
    s: ex:$(teacherId)
    po:
      - [a, ex:Teacher]
      - [ex:fullName, $(teacher)]
      - [ex:department, $(department)]
      - [ex:email, $(email)]

  lesson:
    sources:
      - ['schedule-example.csv~csv']
    s: ex:$(lessonId)
    po:
      - [a, ex:Lesson]
      - [ex:subject, $(subject)]
      - [ex:dayOfWeek, $(day)]
      - [ex:weekType, $(weekType)]
      - [ex:timeStart, $(timeStart)]
      - [ex:timeEnd, $(timeEnd)]
      - [ex:lessonType, $(lessonType)]
      - [ex:classroom, $(classroom)]
      - [ex:isElective, $(isElective), xsd:boolean]
      - p: ex:hasTeacher
        o:
          - value: ex:$(teacherId)
            type: iri
      - p: ex:belongsToGroup
        o:
          - value: ex:$(groupId)
            type: iri
      - p: ex:belongsToDocument
        o:
          - value: ex:$(documentId)
            type: iri
